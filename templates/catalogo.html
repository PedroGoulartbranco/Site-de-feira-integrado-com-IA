<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cátalogo</title>
    <link rel="shortcut icon" href="../static/img/icon.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/catalogo.css') }}">
</head>

<body>
    <div id="overlay" onclick="fechar_barras_laterais()"></div>
    <div id="barra_lateral" class="barra-lateral">
        
    </div>
    <div class="div_icone_carrinho" onclick="ver_carrinho()">
        <img src="static/img/shopping-cart.png">
    </div>
    <header class="container text-center py-4">
        <h1 class="display-5 fw-normal">Cátalogo</h1>
    </header>
    <div class="container-busca">
        <input type="text" class="input-busca" id="barra_pesquisa" placeholder="O que busca?">
        <button type="button" class="botao-busca" id="botao_pesquisar">Pesquisar</button>
    </div>
    <div class="d-flex flex-wrap gap-2 justify-content-center mt-2" id="mostrar_filtros">
        <p>Filtro: <span id="filtros"></span></p>
    </div>
    <div id="carregamento">
        <div class="circulo"></div>
        <p style="margin-left: 10px;">Buscando produtos...</p>
    </div>
    <div class="container py-5">
        <div id="produtos" class="row g-4 justify-content-center">

        </div>
    </div>
    <script src="{{url_for('static', filename=('js/carrinho.js'))}}"></script>
    <script src="{{url_for('static', filename=('js/script.js'))}}"></script>
</body>

</html>
