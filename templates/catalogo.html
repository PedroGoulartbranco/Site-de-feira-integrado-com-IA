<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cátalogo</title>
    <link rel="shortcut icon" href="../static/img/icon.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/catalogo.css') }}">
</head>

<body>
    <h1>Cátalogo</h1>
    <p>Filtro: {% for filtro in filtros %} {{filtro}} {% endfor %}</p>
    <div class="produtos">
        {% for produto in produtos %}
        <div class="card" style="width: 18rem">
            <img src="{{ url_for('static', filename='img/produtos/' + produto.img) }}" class="card-img-top" alt="...">
            <div class="card-body">
                <h5 class="card-title">{{produto.name}}</h5>
                <p class="card-text">
                    Produto
                </p>
                <a href="#" class="btn btn-primary">Adicionar no Carrinho</a>
            </div>
        </div>
        {% endfor %}
    </div>
    <script src="{{url_for('static', filename=('js/script.js'))}}"></script>
</body>

</html>
